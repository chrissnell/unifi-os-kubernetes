---
name: Build and publish unifi-os-server image

# Builds the application image (our entrypoint layered on top of the
# `uosserver` base) for both arches and publishes to GHCR.

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-image.yaml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/unifi-os-server

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read UOS version from Dockerfile
        id: uosver
        run: |
          UOS_VERSION=$(awk -F'"' '/^ENV UOS_SERVER_VERSION=/ {print $2}' docker/Dockerfile)
          if [ -z "$UOS_VERSION" ]; then
            echo "Could not parse UOS_SERVER_VERSION from docker/Dockerfile" >&2
            exit 1
          fi
          UOS_MAJOR_MINOR=$(echo "$UOS_VERSION" | cut -d. -f1-2)
          UOS_MAJOR=$(echo "$UOS_VERSION" | cut -d. -f1)
          {
            echo "uos_version=$UOS_VERSION"
            echo "uos_major_minor=$UOS_MAJOR_MINOR"
            echo "uos_major=$UOS_MAJOR"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=${{ steps.uosver.outputs.uos_version }},enable={{ is_default_branch }}
            type=raw,value=${{ steps.uosver.outputs.uos_major_minor }},enable={{ is_default_branch }}
            type=raw,value=${{ steps.uosver.outputs.uos_major }},enable={{ is_default_branch }}
            type=raw,value=latest,enable={{ is_default_branch }}
          flavor: |
            latest=false

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

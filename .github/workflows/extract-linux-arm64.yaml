---
name: Extract uosserver image (linux/arm64)

# arm64 sibling of extract-linux-amd64.yaml. Runs on the GitHub-hosted arm64
# runner so the installer's native binaries execute correctly.

on:
  workflow_call:
    inputs:
      UOS_DOWNLOAD:
        required: true
        type: string
    outputs:
      PODMAN_IMAGE_TAG:
        description: "Tag of the extracted uosserver image"
        value: ${{ jobs.extract-image.outputs.PODMAN_IMAGE_TAG }}
  workflow_dispatch:
    inputs:
      UOS_DOWNLOAD:
        description: "UniFi OS Server installer URL (linux-arm64)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  extract-image:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      PODMAN_IMAGE_TAG: ${{ steps.tag.outputs.PODMAN_IMAGE_TAG }}

    steps:
      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Run UniFi OS Server installer
        run: |
          mkdir -p /home/runner/.config/containers
          chmod 755 /home/runner /home/runner/.config /home/runner/.config/containers
          touch /home/runner/.config/containers/storage.conf
          chmod 755 /home/runner/.config/containers/storage.conf
          curl -fsSL -o unifi-os-server "${{ inputs.UOS_DOWNLOAD }}"
          sudo chmod +x unifi-os-server
          echo "y" | sudo ./unifi-os-server || true

      - name: Move uosserver image into runner podman storage
        run: |
          for sub in overlay overlay-images overlay-layers; do
            mkdir -p "/home/runner/.local/share/containers/storage/$sub"
            sudo cp -a "/home/uosserver/.local/share/containers/storage/$sub/." \
              "/home/runner/.local/share/containers/storage/$sub/"
          done
          sudo chown -R runner:runner /home/runner/.local/share/containers/storage
          podman images

      - name: Capture upstream OCI config + drift detection
        # See extract-linux-amd64.yaml for rationale.
        run: |
          set -euo pipefail
          PODMAN_IMAGE_ID=$(podman images uosserver --noheading | awk 'NR==1{print $3}')
          if [ -z "$PODMAN_IMAGE_ID" ]; then
            echo "uosserver image not found in podman storage" >&2
            podman images
            exit 1
          fi
          podman inspect "$PODMAN_IMAGE_ID" --format '{{json .Config}}' > /tmp/upstream-config.json

          {
            echo "## Upstream OCI image config (linux/arm64)"
            echo ""
            echo "\`\`\`json"
            jq . /tmp/upstream-config.json
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          ENTRYPOINT=$(jq -c '.Entrypoint // []' /tmp/upstream-config.json)
          CMD=$(jq -c '.Cmd // []' /tmp/upstream-config.json)
          echo "Upstream Entrypoint: $ENTRYPOINT"
          echo "Upstream Cmd:        $CMD"

          COMBINED=$(jq -r '((.Entrypoint // []) + (.Cmd // [])) | join(" ")' /tmp/upstream-config.json)
          case "$COMBINED" in
            *"/sbin/init"*|*" init"*|"init"|"/sbin/init")
              echo "Upstream boots /sbin/init directly."
              ;;
            *)
              # Upstream boots through a wrapper script rather than /sbin/init
              # directly. Follow it one level: extract the script, record it
              # for audit, and confirm it still execs /sbin/init.
              WRAPPER=$(jq -r '(.Cmd // [])[-1] // empty' /tmp/upstream-config.json)
              case "$WRAPPER" in
                /*) ;;
                *)
                  echo "::error::Upstream entrypoint changed and is not a wrapper script path: $COMBINED"
                  echo "::error::Update docker/entrypoint.sh and re-run."
                  exit 1
                  ;;
              esac
              echo "Upstream boots via wrapper: $WRAPPER — extracting to verify it execs /sbin/init"
              CID=$(podman create "$PODMAN_IMAGE_ID")
              podman cp "$CID:$WRAPPER" /tmp/upstream-entrypoint.sh
              podman rm "$CID" >/dev/null
              {
                echo ""
                echo "### Upstream wrapper entrypoint (\`$WRAPPER\`)"
                echo ""
                echo "\`\`\`bash"
                cat /tmp/upstream-entrypoint.sh
                echo "\`\`\`"
              } >> "$GITHUB_STEP_SUMMARY"
              if grep -q '/sbin/init' /tmp/upstream-entrypoint.sh; then
                echo "Wrapper hands off to /sbin/init — boot model intact."
              else
                echo "::error::Upstream wrapper $WRAPPER no longer execs /sbin/init."
                echo "::error::Boot model changed — re-review docker/entrypoint.sh and re-run."
                exit 1
              fi
              ;;
          esac

      - name: Upload upstream OCI config artifact
        uses: actions/upload-artifact@v4
        with:
          name: upstream-config-linux-arm64
          path: /tmp/upstream-config.json

      - name: Login to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}

      - name: Push uosserver image
        id: tag
        run: |
          PODMAN_IMAGE_TAG=$(podman images uosserver --noheading | awk 'NR==1{print $2}')
          PODMAN_IMAGE_ID=$(podman images uosserver --noheading | awk 'NR==1{print $3}')
          if [ -z "$PODMAN_IMAGE_TAG" ] || [ -z "$PODMAN_IMAGE_ID" ]; then
            echo "uosserver image not found in podman storage" >&2
            podman images
            exit 1
          fi
          podman push "$PODMAN_IMAGE_ID" \
            "$REGISTRY/$REPO_OWNER/uosserver:${PODMAN_IMAGE_TAG}-linux-arm64"
          echo "PODMAN_IMAGE_TAG=$PODMAN_IMAGE_TAG" >> "$GITHUB_OUTPUT"

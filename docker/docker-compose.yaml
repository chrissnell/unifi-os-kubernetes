---
# Reference docker-compose for running UniFi OS Server outside Kubernetes.
# Adjust the volume host paths and the UOS_SYSTEM_IP env var before use.

services:
  unifi-os-server:
    image: ghcr.io/chrissnell/unifi-os-server:latest
    container_name: unifi-os-server
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      host.docker.internal: host-gateway
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      UOS_SYSTEM_IP: unifi.example.com
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./data/persistent:/persistent
      - ./data/log:/var/log
      - ./data/data:/data
      - ./data/srv:/srv
      - ./data/unifi:/var/lib/unifi
      - ./data/mongodb:/var/lib/mongodb
      - ./data/rabbitmq-ssl:/etc/rabbitmq/ssl
    ports:
      - "11443:443"
      - "8080:8080"
      - "3478:3478/udp"
      - "10003:10003/udp"
      # Optional ports — uncomment as needed:
      # - "5005:5005"
      # - "9543:9543"
      # - "6789:6789"
      # - "8443:8443"
      # - "8444:8444"
      # - "5514:5514/udp"
      # - "11084:11084"
      # - "5671:5671"
      # - "8880:8880"
      # - "8881:8881"
      # - "8882:8882"
    restart: unless-stopped

{{- if .Values.ingress.enabled }}
{{- $fullName := include "unifi-os-server.fullname" . -}}
{{- $svcName := printf "%s-webui" $fullName | trunc 63 | trimSuffix "-" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "unifi-os-server.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- $secret := include "unifi-os-server.tlsSecretName" . }}
      {{- if $secret }}
      secretName: {{ $secret }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ .Values.ports.webui.port }}
{{- end }}
